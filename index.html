<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GA Cold — Warehouse Capacity Dashboard</title>
<script src="https://alcdn.msauth.net/browser/2.38.3/js/msal-browser.min.js" crossorigin="anonymous"></script>
<script>if(typeof msal === "undefined"){document.write('<script src="https://cdn.jsdelivr.net/npm/@azure/msal-browser@2.38.3/lib/msal-browser.min.js"><\/script>');}</script>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#ffffff;--bg2:#f5f5f2;--bg3:#eeede9;
    --txt:#1a1a18;--txt2:#6b6b67;
    --bdr:rgba(0,0,0,0.12);--bdr2:rgba(0,0,0,0.22);
    --rm:8px;--rl:12px;
    --green:#0F6E56;--amber:#BA7517;--red:#A32D2D;
    --bar-g:#1D9E75;--bar-a:#EF9F27;--bar-r:#E24B4A;
  }
  @media(prefers-color-scheme:dark){:root{
    --bg:#1e1e1c;--bg2:#2a2a28;--bg3:#333331;
    --txt:#f0efe9;--txt2:#9a9a94;
    --bdr:rgba(255,255,255,0.1);--bdr2:rgba(255,255,255,0.2);
    --green:#5DCAA5;--amber:#FAC775;--red:#F09595;
  }}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg3);color:var(--txt);min-height:100vh}
  .page{max-width:1100px;margin:0 auto;padding:1.5rem 1rem 3rem}
  .header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;flex-wrap:wrap;gap:8px}
  .header h1{font-size:20px;font-weight:600}
  .hright{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .ds{font-size:13px;color:var(--txt2)}
  .btn{font-size:12px;padding:6px 14px;border:0.5px solid var(--bdr2);border-radius:var(--rm);background:var(--bg);color:var(--txt);cursor:pointer;font-family:inherit}
  .btn:hover{background:var(--bg2)}
  .btn-red{color:var(--red)}
  .btn-primary{background:#0078d4;color:#fff;border-color:#0078d4;font-size:14px;padding:10px 28px;border-radius:var(--rm);cursor:pointer;font-family:inherit;font-weight:500;display:inline-flex;align-items:center;gap:8px}
  .btn-primary:hover{background:#106ebe}
  .sbar{display:flex;align-items:center;gap:8px;padding:.5rem .85rem;border-radius:var(--rm);margin-bottom:1.25rem;font-size:12px;background:var(--bg2);border:0.5px solid var(--bdr);min-height:36px}
  .sdot{width:8px;height:8px;border-radius:50%;flex-shrink:0;background:#888}
  .sdot.ok{background:var(--bar-g)}.sdot.saving{background:var(--bar-a);animation:pulse 1s infinite}.sdot.err{background:var(--bar-r)}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  .stxt{color:var(--txt2);flex:1}.slast{font-size:11px;color:var(--txt2);margin-left:auto}
  .sgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:1.5rem}
  .metric{background:var(--bg);border:0.5px solid var(--bdr);border-radius:var(--rm);padding:.85rem 1rem}
  .metric .lbl{font-size:11px;color:var(--txt2);margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em}
  .metric .val{font-size:24px;font-weight:500}
  .good{color:var(--green)}.warn{color:var(--amber)}.bad{color:var(--red)}
  .tabs{display:flex;border-bottom:1px solid var(--bdr);margin-bottom:1.25rem}
  .tab{padding:8px 18px;font-size:13px;cursor:pointer;border:none;background:none;color:var(--txt2);border-bottom:2px solid transparent;margin-bottom:-1px;font-family:inherit}
  .tab.active{color:var(--txt);border-bottom-color:var(--txt);font-weight:500}
  .view{display:none}.view.active{display:block}
  .legend{display:flex;flex-wrap:wrap;gap:14px;margin-bottom:1.25rem;align-items:center}
  .ll{font-size:12px;color:var(--txt2);font-weight:500}
  .li{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--txt2)}
  .dot{display:inline-block;width:9px;height:9px;border-radius:50%;flex-shrink:0}
  .rgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:14px;margin-bottom:1.5rem}
  .rcard{background:var(--bg);border:0.5px solid var(--bdr);border-radius:var(--rl);overflow:hidden}
  .rhdr{display:flex;align-items:center;justify-content:space-between;padding:.65rem 1rem;border-bottom:0.5px solid var(--bdr)}
  .rtitle{font-size:14px;font-weight:500}
  .cwrap{display:flex;align-items:center;gap:6px}
  .cwrap label{font-size:11px;color:var(--txt2)}
  .cwrap input{width:68px;font-size:13px;padding:3px 7px;border:0.5px solid var(--bdr2);border-radius:var(--rm);background:var(--bg2);color:var(--txt);text-align:right;font-family:inherit}
  .bwrap{padding:.5rem 1rem .3rem;display:flex;align-items:center;gap:8px}
  .btrack{flex:1;height:6px;background:var(--bg2);border-radius:3px;overflow:hidden}
  .bfill{height:100%;border-radius:3px;transition:width .3s,background .3s}
  .bpct{font-size:11px;color:var(--txt2);min-width:36px;text-align:right}
  .rtable{width:100%;border-collapse:collapse;font-size:12px}
  .rtable thead th{padding:5px 10px;text-align:left;font-size:11px;font-weight:500;color:var(--txt2);background:var(--bg2);border-bottom:0.5px solid var(--bdr)}
  .rtable thead th:not(:first-child){text-align:right}
  .rtable tbody td{padding:5px 10px;border-bottom:0.5px solid var(--bdr);vertical-align:middle}
  .rtable tbody td:not(:first-child){text-align:right}
  .rtable tbody tr:last-child td{border-bottom:none}
  .ni{width:58px;font-size:12px;padding:3px 6px;border:0.5px solid var(--bdr2);border-radius:var(--rm);background:var(--bg2);color:var(--txt);text-align:right;font-family:inherit}
  .ni:focus,.cwrap input:focus{outline:none;border-color:#0078d4;box-shadow:0 0 0 2px rgba(0,120,212,.15)}
  .rftr{display:flex;justify-content:space-between;align-items:center;padding:.55rem 1rem;background:var(--bg2);font-size:12px}
  .nopen{font-weight:500;font-size:13px}
  .cgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin-bottom:1.25rem}
  .ccard{background:var(--bg);border:0.5px solid var(--bdr);border-radius:var(--rm);padding:.85rem}
  .cname{display:flex;align-items:center;font-size:13px;font-weight:500;margin-bottom:8px}
  .crows{font-size:12px;color:var(--txt2)}
  .crows div{display:flex;justify-content:space-between;padding:2px 0}
  .crows span{color:var(--txt);font-weight:500}
  .mwrap{background:var(--bg);border:0.5px solid var(--bdr);border-radius:var(--rl);overflow:hidden}
  .mtitle{padding:.75rem 1rem;border-bottom:0.5px solid var(--bdr);font-size:13px;font-weight:500}
  .mscroll{overflow-x:auto}
  .mtable{width:100%;border-collapse:collapse;font-size:12px;white-space:nowrap}
  .mtable thead th{padding:7px 12px;text-align:right;font-size:11px;font-weight:500;color:var(--txt2);background:var(--bg2);border-bottom:0.5px solid var(--bdr)}
  .mtable thead th:first-child{text-align:left}
  .mtable tbody td{padding:6px 12px;border-bottom:0.5px solid var(--bdr);text-align:right}
  .mtable tbody td:first-child{text-align:left}
  .mtable tbody tr:last-child td{border-bottom:none}
  .tcol{font-weight:500}
  .overlay{position:fixed;inset:0;background:var(--bg3);display:flex;align-items:center;justify-content:center;z-index:999}
  .overlay.hidden{display:none}
  .spinner{width:28px;height:28px;border:2px solid var(--bdr2);border-top-color:#0078d4;border-radius:50%;animation:spin .7s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .otxt{font-size:13px;color:var(--txt2)}
  .auth-card{background:var(--bg);border:0.5px solid var(--bdr);border-radius:var(--rl);padding:2.5rem 2rem;max-width:420px;text-align:center;box-shadow:0 4px 24px rgba(0,0,0,.08)}
  .auth-card .logo{font-size:40px;margin-bottom:1rem}
  .auth-card h2{font-size:18px;font-weight:600;margin-bottom:.5rem;color:var(--txt)}
  .auth-card p{font-size:13px;color:var(--txt2);margin-bottom:1.5rem;line-height:1.6}
  .ms-logo{width:20px;height:20px}
  .auth-err{font-size:12px;color:var(--red);margin-top:1rem;padding:.5rem;background:rgba(163,45,45,.08);border-radius:var(--rm);display:none}
  .spinner-wrap{display:flex;flex-direction:column;align-items:center;gap:12px}
</style>
</head>
<body>

<div class="overlay" id="overlay">
  <div class="spinner-wrap" id="ov-spinner">
    <div class="spinner"></div>
    <div class="otxt" id="ov-text">Checking sign-in...</div>
  </div>
  <div class="auth-card" id="ov-auth" style="display:none">
    <div class="logo">🏭</div>
    <h2>GA Cold Warehouse</h2>
    <p>Sign in with your <strong>@gacold.com</strong> Microsoft account to access live warehouse data.</p>
    <button class="btn-primary" id="signin-btn" onclick="signIn()">
      <svg class="ms-logo" viewBox="0 0 21 21" xmlns="http://www.w3.org/2000/svg">
        <rect x="1" y="1" width="9" height="9" fill="#f25022"/>
        <rect x="11" y="1" width="9" height="9" fill="#7fba00"/>
        <rect x="1" y="11" width="9" height="9" fill="#00a4ef"/>
        <rect x="11" y="11" width="9" height="9" fill="#ffb900"/>
      </svg>
      Sign in with Microsoft
    </button>
    <div class="auth-err" id="auth-err"></div>
  </div>
</div>

<div class="page">
  <div class="header">
    <h1>GA Cold — Warehouse Capacity</h1>
    <div class="hright">
      <span class="ds" id="datestamp"></span>
      <span id="user-name" style="font-size:12px;color:var(--txt2)"></span>
      <button class="btn" onclick="loadData()">&#8635; Refresh</button>
      <button class="btn" onclick="exportCSV()">Export CSV</button>
      <button class="btn btn-red" onclick="resetAll()">Reset all</button>
      <button class="btn" id="signout-btn" onclick="signOut()" style="display:none">Sign out</button>
    </div>
  </div>

  <div class="sbar">
    <div class="sdot" id="sdot"></div>
    <span class="stxt" id="stxt">Initializing...</span>
    <span class="slast" id="slast"></span>
  </div>

  <div class="sgrid">
    <div class="metric"><div class="lbl">Total capacity</div><div class="val" id="s-total">—</div></div>
    <div class="metric"><div class="lbl">Occupied</div><div class="val" id="s-occ">—</div></div>
    <div class="metric"><div class="lbl">Net open</div><div class="val" id="s-open">—</div></div>
    <div class="metric"><div class="lbl">Utilization</div><div class="val" id="s-util">—</div></div>
    <div class="metric"><div class="lbl">In today</div><div class="val" id="s-in">—</div></div>
    <div class="metric"><div class="lbl">Out today</div><div class="val" id="s-out">—</div></div>
  </div>

  <div class="legend" id="legend"></div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('rooms',this)">By room</button>
    <button class="tab" onclick="switchTab('customers',this)">By customer</button>
  </div>

  <div id="view-rooms" class="view active"><div class="rgrid" id="room-grid"></div></div>
  <div id="view-customers" class="view">
    <div class="cgrid" id="cust-grid"></div>
    <div class="mwrap">
      <div class="mtitle">Customer × Room breakdown — occupied pallets</div>
      <div class="mscroll"><table class="mtable"><thead id="mhead"></thead><tbody id="mbody"></tbody></table></div>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════
//  CONFIGURATION
// ═══════════════════════════════════════════════════
const CLIENT_ID  = 'c4d0113f-68bb-4e58-9539-7f3b53c0ae47';
const TENANT_ID  = 'dc242245-762d-49c2-8f43-33db994d2b4c'; // Georgia Cold Storage tenant
const SP_HOST    = 'gacold.sharepoint.com';
const SP_SITE    = '/sites/ProductionData';
const FILE_PATH  = '/Shared Documents/WarehouseCapacity.xlsx';
const SHEET      = 'WarehouseData';
const REFRESH_MS = 30000;
// ═══════════════════════════════════════════════════

const ROOMS     = ['Room 1','Room 2','Room 3','Room 4','Room 14','Room 15'];
const CUSTOMERS = ['McClain','Corinthian','Curate','Refresco','Belgian Boys','ChefLMT'];
const COLORS    = ['#1D9E75','#378ADD','#D85A30','#D4537E','#7F77DD','#BA7517'];
const DEF_CAP   = [180,180,120,120,200,200];
const DATA_ROW  = 3;

// Use SharePoint-scoped permissions — NO admin consent required
// Each user approves their own access on first sign-in
const GRAPH_SCOPES = [
  'User.Read',
  'Files.ReadWrite.All'
];

const state = {
  cap:[...DEF_CAP],
  occ:ROOMS.map(()=>CUSTOMERS.map(()=>0)),
  inc:ROOMS.map(()=>CUSTOMERS.map(()=>0)),
  out:ROOMS.map(()=>CUSTOMERS.map(()=>0)),
};

let msalApp=null, token=null, driveId=null, fileId=null;
let saveTimers={}, refreshTimer=null;

// ── MSAL ─────────────────────────────────────────────────────
function initMsal(){
  msalApp = new msal.PublicClientApplication({
    auth:{
      clientId: CLIENT_ID,
      authority: 'https://login.microsoftonline.com/dc242245-762d-49c2-8f43-33db994db881',
      redirectUri: 'https://willinghamrobert84-del.github.io/warehouse-dashboard',
      postLogoutRedirectUri: 'https://willinghamrobert84-del.github.io/warehouse-dashboard',
    },
    cache:{ cacheLocation:'localStorage', storeAuthStateInCookie:true }
  });
}

async function getToken(){
  const accounts = msalApp.getAllAccounts();
  const account  = accounts[0] || null;
  try {
    const r = await msalApp.acquireTokenSilent({ scopes:GRAPH_SCOPES, account });
    token = r.accessToken;
  } catch(e) {
    // Fallback to redirect if silent fails
    await msalApp.acquireTokenRedirect({ scopes:GRAPH_SCOPES });
  }
}

async function signIn(){
  setAuthErr('');
  document.getElementById('signin-btn').textContent = 'Redirecting to Microsoft...';
  try {
    await msalApp.loginRedirect({ scopes:GRAPH_SCOPES });
  } catch(e) {
    document.getElementById('signin-btn').textContent = 'Sign in with Microsoft';
    setAuthErr('Sign-in failed: ' + (e.message||e));
    showAuthCard();
  }
}

async function signOut(){
  clearInterval(refreshTimer);
  await msalApp.logoutRedirect();
}

// ── Graph API ────────────────────────────────────────────────
async function gFetch(path, opts={}){
  await getToken();
  const r = await fetch('https://graph.microsoft.com/v1.0'+path,{
    ...opts,
    headers:{ 'Authorization':'Bearer '+token, 'Content-Type':'application/json', ...(opts.headers||{}) }
  });
  return r;
}

async function resolveFile(){
  if(fileId) return;
  // Use /me/drive to access SharePoint files via user's drive - no Sites permission needed
  const fr = await gFetch(`/me/drive/root:/sites/ProductionData/Shared Documents/WarehouseCapacity.xlsx`);
  if(!fr.ok){
    // Try searching for the file
    const sr = await gFetch(`/me/drive/root/search(q='WarehouseCapacity')`);
    if(sr.ok){
      const sd = await sr.json();
      const found = sd.value && sd.value.find(f=>f.name==='WarehouseCapacity.xlsx');
      if(found){ fileId=found.id; driveId=found.parentReference&&found.parentReference.driveId; return; }
    }
    // Try direct SharePoint path
    const sp = await gFetch(`/sites/${SP_HOST}:${SP_SITE}:/drives`);
    if(!sp.ok) throw new Error('Cannot access SharePoint. Please make sure WarehouseCapacity.xlsx is in the Documents library and you have access.');
    const spd = await sp.json();
    const drive = spd.value&&(spd.value.find(d=>d.name==='Documents')||spd.value[0]);
    if(!drive) throw new Error('Cannot find Documents library on SharePoint.');
    driveId = drive.id;
    const ff = await gFetch(`/drives/${driveId}/root:/WarehouseCapacity.xlsx`);
    if(!ff.ok) throw new Error('WarehouseCapacity.xlsx not found in SharePoint Documents library.');
    const fd = await ff.json();
    fileId = fd.id;
    return;
  }
  const fd = await fr.json();
  fileId = fd.id;
  driveId = fd.parentReference&&fd.parentReference.driveId;
}

function xlBase(){ return `/drives/${driveId}/items/${fileId}/workbook/worksheets('${SHEET}')`; }

function numToCol(n){let s='';while(n>0){n--;s=String.fromCharCode(65+n%26)+s;n=Math.floor(n/26);}return s;}
function cellAddr(ri,ci,fi){ return numToCol(2+ri*4+fi)+(DATA_ROW+ci); }
function dataRange(){
  return `A${DATA_ROW}:${numToCol(1+ROOMS.length*4)}${DATA_ROW+CUSTOMERS.length-1}`;
}

// ── Load ─────────────────────────────────────────────────────
async function loadData(){
  setStatus('saving','Loading...');
  try {
    await resolveFile();
    const r = await gFetch(`${xlBase()}/range(address='${dataRange()}')`);
    if(!r.ok){
      const t=await r.text();
      throw new Error(`Read error (${r.status}). ${t.includes('locked')?'File may be locked by another user — try again in a moment.':''}`);
    }
    const d = await r.json();
    const vals = d.values;
    CUSTOMERS.forEach((_,ci)=>{
      const row=vals[ci];
      ROOMS.forEach((_,ri)=>{
        const b=1+ri*4;
        state.cap[ri]     = parseInt(row[b])   || DEF_CAP[ri];
        state.occ[ri][ci] = parseInt(row[b+1]) || 0;
        state.inc[ri][ci] = parseInt(row[b+2]) || 0;
        state.out[ri][ci] = parseInt(row[b+3]) || 0;
      });
    });
    refreshInputs(); recalc();
    setStatus('ok','Connected to SharePoint — refreshes every 30s');
    document.getElementById('slast').textContent='Loaded: '+timeStr();
  } catch(e){
    setStatus('err',e.message);
    console.error(e);
  }
}

// ── Save ──────────────────────────────────────────────────────
async function saveRange(addr, values){
  await resolveFile();
  const r = await gFetch(`${xlBase()}/range(address='${addr}')`,{
    method:'PATCH', body:JSON.stringify({values})
  });
  if(!r.ok){ const t=await r.text(); throw new Error(`Save failed (${r.status}): ${t}`); }
}

function sched(key,fn){
  clearTimeout(saveTimers[key]);
  saveTimers[key]=setTimeout(async()=>{
    setStatus('saving','Saving...');
    try{ await fn(); setStatus('ok','Connected to SharePoint — refreshes every 30s'); document.getElementById('slast').textContent='Saved: '+timeStr(); }
    catch(e){ setStatus('err','Save failed: '+e.message); console.error(e); }
  },900);
}

function updateCap(ri,val){
  state.cap[ri]=Math.max(0,parseInt(val)||0); recalc();
  sched(`cap${ri}`,async()=>{
    for(let ci=0;ci<CUSTOMERS.length;ci++) await saveRange(cellAddr(ri,ci,0),[[state.cap[ri]]]);
  });
}
function updateVal(field,ri,ci,val){
  state[field][ri][ci]=Math.max(0,parseInt(val)||0); recalc();
  const fi={occ:1,inc:2,out:3}[field];
  sched(`${field}${ri}${ci}`,()=>saveRange(cellAddr(ri,ci,fi),[[state[field][ri][ci]]]));
}

// ── UI helpers ────────────────────────────────────────────────
function setStatus(t,m){
  document.getElementById('sdot').className='sdot '+(t==='saving'?'saving':t==='ok'?'ok':'err');
  document.getElementById('stxt').textContent=m;
}
function timeStr(){return new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',second:'2-digit'});}
function setText(id,v){const e=document.getElementById(id);if(e)e.textContent=v;}
function showSpinner(m){
  document.getElementById('ov-spinner').style.display='flex';
  document.getElementById('ov-auth').style.display='none';
  document.getElementById('ov-text').textContent=m||'Loading...';
  document.getElementById('overlay').classList.remove('hidden');
}
function showAuthCard(){
  document.getElementById('ov-spinner').style.display='none';
  document.getElementById('ov-auth').style.display='';
  document.getElementById('overlay').classList.remove('hidden');
}
function hideOverlay(){ document.getElementById('overlay').classList.add('hidden'); }
function setAuthErr(m){ const e=document.getElementById('auth-err'); e.textContent=m; e.style.display=m?'':'none'; }

function refreshInputs(){
  ROOMS.forEach((_,ri)=>{
    const e=document.getElementById(`cap-${ri}`);if(e)e.value=state.cap[ri];
    CUSTOMERS.forEach((_,ci)=>['occ','inc','out'].forEach(f=>{const el=document.getElementById(`${f}-${ri}-${ci}`);if(el)el.value=state[f][ri][ci];}));
  });
}
function netOpen(ri){return state.cap[ri]-state.occ[ri].reduce((a,b)=>a+b,0)-state.inc[ri].reduce((a,b)=>a+b,0)+state.out[ri].reduce((a,b)=>a+b,0);}

// ── Build DOM ─────────────────────────────────────────────────
function buildLegend(){
  const g=document.getElementById('legend');g.innerHTML='<span class="ll">Customers:</span>';
  CUSTOMERS.forEach((c,i)=>{const s=document.createElement('span');s.className='li';s.innerHTML=`<span class="dot" style="background:${COLORS[i]}"></span>${c}`;g.appendChild(s);});
}
function buildRooms(){
  const g=document.getElementById('room-grid');g.innerHTML='';
  ROOMS.forEach((room,ri)=>{
    const d=document.createElement('div');d.className='rcard';
    d.innerHTML=`<div class="rhdr"><span class="rtitle">${room}</span><div class="cwrap"><label>Capacity</label><input type="number" min="0" id="cap-${ri}" value="${state.cap[ri]}" onchange="updateCap(${ri},this.value)"></div></div>
    <div class="bwrap"><div class="btrack"><div class="bfill" id="bar-${ri}" style="width:0%"></div></div><span class="bpct" id="pct-${ri}">0%</span></div>
    <table class="rtable"><thead><tr><th>Customer</th><th>Occupied</th><th>Incoming</th><th>Outgoing</th></tr></thead><tbody>
    ${CUSTOMERS.map((c,ci)=>`<tr><td><span class="dot" style="background:${COLORS[ci]}"></span> ${c}</td>
    <td><input class="ni" type="number" min="0" id="occ-${ri}-${ci}" value="0" onchange="updateVal('occ',${ri},${ci},this.value)"></td>
    <td><input class="ni" type="number" min="0" id="inc-${ri}-${ci}" value="0" onchange="updateVal('inc',${ri},${ci},this.value)"></td>
    <td><input class="ni" type="number" min="0" id="out-${ri}-${ci}" value="0" onchange="updateVal('out',${ri},${ci},this.value)"></td></tr>`).join('')}
    </tbody></table>
    <div class="rftr"><span style="color:var(--txt2)">Net open spaces</span><span class="nopen" id="net-${ri}">—</span></div>`;
    g.appendChild(d);
  });
}
function buildCustGrid(){
  const g=document.getElementById('cust-grid');g.innerHTML='';
  CUSTOMERS.forEach((c,ci)=>{const d=document.createElement('div');d.className='ccard';d.innerHTML=`<div class="cname"><span class="dot" style="background:${COLORS[ci]};margin-right:6px"></span>${c}</div><div class="crows" id="cs-${ci}"></div>`;g.appendChild(d);});
}
function buildMatrix(){
  document.getElementById('mhead').innerHTML=`<tr><th>Customer</th>${ROOMS.map(r=>`<th>${r}</th>`).join('')}<th>Total</th></tr>`;
  document.getElementById('mbody').innerHTML=CUSTOMERS.map((c,ci)=>`<tr><td><span class="dot" style="background:${COLORS[ci]};margin-right:5px"></span>${c}</td>${ROOMS.map((_,ri)=>`<td id="mx-${ci}-${ri}">0</td>`).join('')}<td class="tcol" id="mx-${ci}-t">0</td></tr>`).join('');
}

function recalc(){
  let tC=0,tO=0,tI=0,tOut=0;
  ROOMS.forEach((_,ri)=>{
    const occ=state.occ[ri].reduce((a,b)=>a+b,0),inc=state.inc[ri].reduce((a,b)=>a+b,0),out=state.out[ri].reduce((a,b)=>a+b,0),net=netOpen(ri);
    tC+=state.cap[ri];tO+=occ;tI+=inc;tOut+=out;
    const pct=state.cap[ri]>0?Math.round((occ/state.cap[ri])*100):0;
    const f=document.getElementById(`bar-${ri}`);
    if(f){f.style.width=Math.min(pct,100)+'%';f.style.background=pct>=90?'var(--bar-r)':pct>=70?'var(--bar-a)':'var(--bar-g)';}
    const pe=document.getElementById(`pct-${ri}`);if(pe)pe.textContent=pct+'%';
    const ne=document.getElementById(`net-${ri}`);if(ne){ne.textContent=net;ne.style.color=net<=0?'var(--red)':net<20?'var(--amber)':'var(--green)';}
  });
  const util=tC>0?Math.round((tO/tC)*100):0,open=tC-tO-tI+tOut;
  setText('s-total',tC.toLocaleString());setText('s-occ',tO.toLocaleString());
  const oe=document.getElementById('s-open');if(oe){oe.textContent=open.toLocaleString();oe.className='val '+(open<=0?'bad':open<50?'warn':'good');}
  const ue=document.getElementById('s-util');if(ue){ue.textContent=util+'%';ue.className='val '+(util>=90?'bad':util>=70?'warn':'good');}
  setText('s-in',tI.toLocaleString());setText('s-out',tOut.toLocaleString());
  CUSTOMERS.forEach((_,ci)=>{
    let cO=0,cI=0,cOut=0;
    ROOMS.forEach((_,ri)=>{cO+=state.occ[ri][ci];cI+=state.inc[ri][ci];cOut+=state.out[ri][ci];const m=document.getElementById(`mx-${ci}-${ri}`);if(m)m.textContent=state.occ[ri][ci];});
    const mt=document.getElementById(`mx-${ci}-t`);if(mt)mt.textContent=cO;
    const diff=cI-cOut;
    const cs=document.getElementById(`cs-${ci}`);
    if(cs)cs.innerHTML=`<div>Occupied <span>${cO}</span></div><div>Incoming <span>${cI}</span></div><div>Outgoing <span>${cOut}</span></div><div>Net change <span style="color:${diff>0?'var(--red)':diff<0?'var(--green)':'inherit'}">${diff>=0?'+':''}${diff}</span></div>`;
  });
}

function switchTab(id,btn){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  btn.classList.add('active');document.getElementById('view-'+id).classList.add('active');
}

async function resetAll(){
  if(!confirm('Reset ALL data to zero for all users?'))return;
  state.cap=[...DEF_CAP];state.occ=ROOMS.map(()=>CUSTOMERS.map(()=>0));state.inc=ROOMS.map(()=>CUSTOMERS.map(()=>0));state.out=ROOMS.map(()=>CUSTOMERS.map(()=>0));
  refreshInputs();recalc();setStatus('saving','Resetting...');
  try{
    const values=CUSTOMERS.map((_,ci)=>{const row=[CUSTOMERS[ci]];ROOMS.forEach((_,ri)=>row.push(DEF_CAP[ri],0,0,0));return row;});
    await saveRange(dataRange(),values);
    setStatus('ok','Reset complete');document.getElementById('slast').textContent='Reset: '+timeStr();
  }catch(e){setStatus('err','Reset failed: '+e.message);}
}

function exportCSV(){
  const rows=[['Room','Customer','Capacity','Occupied','Incoming','Outgoing','Net Open']];
  ROOMS.forEach((room,ri)=>CUSTOMERS.forEach((cust,ci)=>rows.push([room,cust,ci===0?state.cap[ri]:'',state.occ[ri][ci],state.inc[ri][ci],state.out[ri][ci],ci===0?netOpen(ri):''])));
  const a=document.createElement('a');a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(rows.map(r=>r.join(',')).join('\n'));
  a.download='GA_Cold_Warehouse_'+new Date().toISOString().slice(0,10)+'.csv';a.click();
}

async function boot(){
  await loadData();
  clearInterval(refreshTimer);
  refreshTimer=setInterval(loadData,REFRESH_MS);
}

// ── Init ──────────────────────────────────────────────────────
document.getElementById('datestamp').textContent=new Date().toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric'});
buildLegend();buildRooms();buildCustGrid();buildMatrix();recalc();

(async()=>{
  initMsal();
  showSpinner('Checking sign-in status...');
  try {
    await msalApp.initialize();
    const redirectResult = await msalApp.handleRedirectPromise();
    if(redirectResult && redirectResult.account){
      msalApp.setActiveAccount(redirectResult.account);
      token = redirectResult.accessToken;
      document.getElementById('user-name').textContent=redirectResult.account.name||redirectResult.account.username;
      document.getElementById('signout-btn').style.display='';
      hideOverlay();
      await boot();
      return;
    }
    const accounts=msalApp.getAllAccounts();
    if(accounts.length>0){
      msalApp.setActiveAccount(accounts[0]);
      document.getElementById('user-name').textContent=accounts[0].name||accounts[0].username;
      document.getElementById('signout-btn').style.display='';
      await getToken();
      hideOverlay();
      await boot();
    } else {
      showAuthCard();
    }
  } catch(e){
    showAuthCard();
    setAuthErr(e.message);
  }
})();
</script>
